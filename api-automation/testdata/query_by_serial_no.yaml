  title: 安全-UNION注入-信息泄露
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id004
  cookies: *id002
  body:
    bankSerialNo: 0 UNION SELECT table_name,column_name FROM information_schema.columns--
  expected:
    status_code: 200
