api_info:
  name: query_by_serial_no
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  base_url: https://yupao-test-backend.yupaowang.com
test_cases:
- case_id: QUERY_BY_SERIAL_NO_001
  title: 正向场景-全参数有效
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: &id001
    Content-Type: application/json
    business: scrm
  cookies: &id002
    Hm_lvt_14752563c89f0870e93d2f6ac497f815: '1781599584'
    HMACCOUNT: C0F8BF315AD73E97
    Hm_lpvt_14752563c89f0870e93d2f6ac497f815: '1781602520'
    cookieHostname: beacon-test.yupaowang.com
    jwtToken: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..f9gf2m0VIAyxKUHaoRn1-m-9uDYqf7kqhVD6loCCxfg
  body: &id003
    bankSerialNo: BS20240101001
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_002
  title: 正向场景-仅必填字段
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id001
  cookies: *id002
  body:
    bankSerialNo: BS20240101001
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_003
  title: 业务变体
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id001
  cookies: *id002
  body:
    bankSerialNo: BS20240101001_variant
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_004
  title: 异常场景-缺少必填字段-bankSerialNo
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id001
  cookies: *id002
  body: {}
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_NULL_BODY
  title: 空值测试-请求体为null
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id001
  cookies: *id002
  body: null
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_NULL_FIELD
  title: 空值测试-字段为null
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id001
  cookies: *id002
  body:
    bankSerialNo: null
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_EMPTY_OBJ
  title: 空值测试-空对象
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id001
  cookies: *id002
  body: {}
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_NO_AUTH
  title: 【安全测试】未授权访问-无token或cookie访问
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers:
    Content-Type: application/json
    business: scrm
  cookies: {}
  body: *id003
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_BLIND_001
  title: 【安全测试】SQL注入-盲注-布尔盲注
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: &id004
    Content-Type: application/json
    business: scrm
  cookies: *id002
  body:
    bankSerialNo: ''' AND ''1''=''1'
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_BLIND_002
  title: 【安全测试】SQL注入-盲注-时间盲注
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id004
  cookies: *id002
  body:
    bankSerialNo: '''; WAITFOR DELAY ''0:0:5''--'
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_BLIND_003
  title: 【安全测试】SQL注入-盲注-报错注入
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id004
  cookies: *id002
  body:
    bankSerialNo: ''' AND extractvalue(1,concat(0x7e,(SELECT version()),0x7e))--'
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_BLIND_004
  title: 【安全测试】SQL注入-盲注-单引号闭合
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id004
  cookies: *id002
  body:
    bankSerialNo: ''' OR ''1''=''1'
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_BLIND_005
  title: 【安全测试】SQL注入-盲注-注释符截断
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id004
  cookies: *id002
  body:
    bankSerialNo: '''; DROP TABLE users;--'
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_HORIZ_001
  title: 【安全测试】水平越权
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id004
  cookies: *id002
  body:
    bankSerialNo: other_user_id_999
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_XSS_001
  title: 【安全测试】XSS攻击-script标签
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id004
  cookies: *id002
  body:
    bankSerialNo: <script>alert('XSS')</script>
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_XSS_002
  title: 【安全测试】XSS攻击-事件处理器
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id004
  cookies: *id002
  body:
    bankSerialNo: <img src=x onerror=alert('XSS')>
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_XSS_003
  title: 【安全测试】XSS攻击-编码绕过
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id004
  cookies: *id002
  body:
    bankSerialNo: '%3Cscript%3Ealert(''XSS'')%3C/script%3E'
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_HDR_XFF
  title: 【安全测试】Header注入-X-Forwarded-For伪造IP
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers:
    Content-Type: application/json
    business: scrm
    X-Forwarded-For: 127.0.0.1
  cookies: *id002
  body: *id003
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_HDR_UA
  title: 【安全测试】Header注入-User-Agent恶意工具检测
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers:
    Content-Type: application/json
    business: scrm
    User-Agent: sqlmap/1.5#stable (http://sqlmap.org)
  cookies: *id002
  body: *id003
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_BATCH_001
  title: 【安全测试】批量遍历
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id004
  cookies: *id002
  body:
    bankSerialNo: '1'
  expected:
    status_code: 200
- case_id: QUERY_BY_SERIAL_NO_PTYPE_001
  title: 【安全测试】参数类型-数组代替字符串
  method: POST
  path: /trade/v1/bankTransaction/queryBySerialNo
  headers: *id004
  cookies: *id002
