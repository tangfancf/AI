- case_id: LIST_AVAILABLE_BLIND_001
  title: 【安全测试】SQL注入-盲注-布尔盲注
  method: POST
  path: /trade/v1/bankTransaction/listAvailable
  headers: &id004
    Content-Type: application/json
    business: scrm
  cookies: *id002
  body:
    bankSerialNo: ''' AND ''1''=''1'
    currentPage: 1
    pageSize: 10
    payerName: 测试企业有限公司
  expected:
    status_code: 200
- case_id: LIST_AVAILABLE_BLIND_002
  title: 【安全测试】SQL注入-盲注-时间盲注
  method: POST
  path: /trade/v1/bankTransaction/listAvailable
  headers: *id004
  cookies: *id002
  body:
    bankSerialNo: '''; WAITFOR DELAY ''0:0:5''--'
    currentPage: 1
    pageSize: 10
    payerName: 测试企业有限公司
  expected:
    status_code: 200
- case_id: LIST_AVAILABLE_BLIND_003
  title: 【安全测试】SQL注入-盲注-报错注入
  method: POST
  path: /trade/v1/bankTransaction/listAvailable
  headers: *id004
  cookies: *id002
  body:
    bankSerialNo: ''' AND extractvalue(1,concat(0x7e,(SELECT version()),0x7e))--'
    currentPage: 1
    pageSize: 10
    payerName: 测试企业有限公司
  expected:
    status_code: 200
- case_id: LIST_AVAILABLE_BLIND_004
