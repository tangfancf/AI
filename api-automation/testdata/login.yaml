# 登录接口测试数据
test_cases:
  - case_id: "LOGIN_001"
    title: "正常登录-正确的用户名和密码"
    input:
      username: "tangfan"
      password: "P@ssw0rd"
    expected:
      status_code: 200
      code: 0
      msg: "success"

  - case_id: "LOGIN_002"
    title: "异常登录-错误密码"
    input:
      username: "tangfan"
      password: "wrong_password"
    expected:
      status_code: 200
      code: -1
      msg: "用户名或密码错误"

  - case_id: "LOGIN_003"
    title: "异常登录-空用户名"
    input:
      username: ""
      password: "P@ssw0rd"
    expected:
      status_code: 200
      code: -1
      msg: "用户名不能为空"

  - case_id: "LOGIN_004"
    title: "异常登录-空密码"
    input:
      username: "tangfan"
      password: ""
    expected:
      status_code: 200
      code: -1
      msg: "密码不能为空"

  - case_id: "LOGIN_005"
    title: "异常登录-不存在的用户"
    input:
      username: "nonexistent_user_xyz"
      password: "P@ssw0rd"
    expected:
      status_code: 200
      code: -1
      msg: "用户名或密码错误"
