[pytest]
# 测试用例目录
testpaths = testcases

# 标记定义
markers =
    smoke: 冒烟测试
    regression: 回归测试
    login: 登录相关
    user: 用户管理相关

# 默认参数
addopts =
    -v
    --tb=short
    --strict-markers

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S
